<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cute Ski Design</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #cfefff 0%, #eaf7ff 55%, #ffffff 100%);
      overflow: hidden;
      font-family: "Comic Sans MS", "Trebuchet MS", sans-serif;
    }

    .scene {
      text-align: center;
      position: relative;
      width: 100%;
      max-width: 700px;
      height: 500px;
    }

    .title {
      margin-top: 20px;
      font-size: 40px;
      font-weight: bold;
      color: #ff5fa2;
      text-shadow: 2px 2px #fff, 4px 4px #ffd6ec;
      letter-spacing: 1px;
    }

    .mountain {
      position: absolute;
      bottom: 120px;
      width: 0;
      height: 0;
      border-left: 110px solid transparent;
      border-right: 110px solid transparent;
      border-bottom: 190px solid #b7d7f5;
    }

    .mountain::after {
      content: "";
      position: absolute;
      left: -35px;
      top: 28px;
      width: 0;
      height: 0;
      border-left: 35px solid transparent;
      border-right: 35px solid transparent;
      border-bottom: 60px solid #ffffff;
    }

    .mountain.one {
      left: 80px;
    }

    .mountain.two {
      left: 260px;
      bottom: 100px;
      transform: scale(1.2);
      border-bottom-color: #a9cdee;
    }

    .mountain.three {
      left: 470px;
      bottom: 125px;
      transform: scale(0.9);
    }

    .snow-ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 150px;
      background: #ffffff;
      border-top-left-radius: 60% 40px;
      border-top-right-radius: 60% 40px;
    }

    .skier {
      position: absolute;
      left: 285px;
      bottom: 105px;
      width: 120px;
      height: 180px;
    }

    .head {
      position: absolute;
      top: 10px;
      left: 42px;
      width: 38px;
      height: 38px;
      background: #ffd6b3;
      border: 4px solid #333;
      border-radius: 50%;
      z-index: 3;
    }

    .hat {
      position: absolute;
      top: -2px;
      left: 38px;
      width: 46px;
      height: 22px;
      background: #ff5fa2;
      border: 4px solid #333;
      border-radius: 18px 18px 10px 10px;
      z-index: 4;
    }

    .pom {
      position: absolute;
      top: -12px;
      left: 55px;
      width: 16px;
      height: 16px;
      background: #fff;
      border: 3px solid #333;
      border-radius: 50%;
      z-index: 5;
    }

    .body-suit {
      position: absolute;
      top: 48px;
      left: 32px;
      width: 56px;
      height: 62px;
      background: #8e7dff;
      border: 4px solid #333;
      border-radius: 20px;
      z-index: 2;
    }

    .arm {
      position: absolute;
      width: 44px;
      height: 10px;
      background: #8e7dff;
      border: 4px solid #333;
      border-radius: 10px;
      top: 65px;
      z-index: 1;
    }

    .arm.left {
      left: 2px;
      transform: rotate(25deg);
    }

    .arm.right {
      left: 72px;
      transform: rotate(-35deg);
    }

    .pole {
      position: absolute;
      width: 4px;
      height: 85px;
      background: #555;
      top: 65px;
      z-index: 0;
    }

    .pole.left {
      left: 8px;
      transform: rotate(20deg);
    }

    .pole.right {
      left: 103px;
      transform: rotate(-15deg);
    }

    .leg {
      position: absolute;
      width: 12px;
      height: 60px;
      background: #ff8fab;
      border: 4px solid #333;
      border-radius: 10px;
      top: 103px;
    }

    .leg.left {
      left: 42px;
      transform: rotate(18deg);
    }

    .leg.right {
      left: 67px;
      transform: rotate(-12deg);
    }

    .ski {
      position: absolute;
      width: 82px;
      height: 10px;
      background: #ff4d6d;
      border: 4px solid #333;
      border-radius: 20px;
      bottom: 8px;
    }

    .ski.left {
      left: 10px;
      transform: rotate(16deg);
    }

    .ski.right {
      left: 45px;
      transform: rotate(-8deg);
    }

    .flake {
      position: absolute;
      color: white;
      font-size: 22px;
      text-shadow: 0 0 6px rgba(255,255,255,0.9);
      animation: fall linear infinite;
    }

    .flake:nth-child(1) { left: 40px; top: 20px; animation-duration: 6s; }
    .flake:nth-child(2) { left: 140px; top: 60px; animation-duration: 8s; }
    .flake:nth-child(3) { left: 250px; top: 30px; animation-duration: 7s; }
    .flake:nth-child(4) { left: 360px; top: 80px; animation-duration: 5s; }
    .flake:nth-child(5) { left: 520px; top: 40px; animation-duration: 9s; }
    .flake:nth-child(6) { left: 640px; top: 15px; animation-duration: 6.5s; }

    .heart {
      position: absolute;
      color: #ff7eb6;
      font-size: 22px;
      animation: float 2.5s ease-in-out infinite;
    }

    .heart.one {
      top: 95px;
      left: 230px;
    }

    .heart.two {
      top: 140px;
      right: 180px;
      animation-delay: 1s;
    }

    @keyframes fall {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(430px); opacity: 0.3; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="title">Tamaar rodis maswavliii?</div>

    <div class="flake">❄</div>
    <div class="flake">❄</div>
    <div class="flake">❄</div>
    <div class="flake">❄</div>
    <div class="flake">❄</div>
    <div class="flake">❄</div>

    <div class="heart one">♥</div>
    <div class="heart two">♥</div>

    <div class="mountain one"></div>
    <div class="mountain two"></div>
    <div class="mountain three"></div>

    <div class="skier">
      <div class="hat"></div>
      <div class="pom"></div>
      <div class="head"></div>
      <div class="body-suit"></div>
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="pole left"></div>
      <div class="pole right"></div>
      <div class="leg left"></div>
      <div class="leg right"></div>
      <div class="ski left"></div>
      <div class="ski right"></div>
    </div>

    <div class="snow-ground"></div>
  </div>
</body>
</html>
